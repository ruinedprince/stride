# Stride Phase 0 — GraphHopper config (foot routing, flexible mode)
# Based on config-example.yml from GraphHopper 11.0.
graphhopper:
  # Regional OSM extract — Guaratinguetá microregion (bbox lon -45.50..-44.90,
  # lat -23.00..-22.55: Guará, Aparecida, Lorena, Cachoeira Paulista, Cruzeiro,
  # Piquete…). Roads + green only (buildings come from tiles now), so it stays
  # small. Re-fetch with data/region.overpassql via the Overpass API.
  datareader.file: data/region.osm
  graph.location: graph-cache

  # Phase 4 — elevation. CGIAR SRTM (90 m, open, no key) is downloaded on the
  # first import and cached; route responses then carry ascend/descend and the
  # geometry gets a 3rd (elevation) coordinate. average_slope/max_slope are
  # exposed for a future flat-vs-hilly preference.
  graph.elevation.provider: cgiar
  graph.elevation.cache_dir: elevation-cache

  profiles:
    - name: foot
      custom_model_files: [foot.json]
    # Phase 1 — greenery-aware walking. green.json (generated by
    # scripts/build_green_areas.py) keeps priority 1.0 inside green polygons
    # and multiplies everything else by 0.6, so round_trip prefers loops
    # through parks, woods and grass areas.
    - name: foot_green
      custom_model_files: [foot.json, green.json]
    # Phase 2 — shade-aware walking is NOT a static profile: the frontend posts
    # the hour's shade custom model per request (built from the display geojson),
    # so any baked hour routes with no server restart. See README "Phase 2".

  # Where to look for non-built-in custom model files (green.json).
  custom_models.directory: custom_models

  # IMPORTANT: no profiles_ch — round_trip needs flexible mode (CH does not
  # support algorithm=round_trip). With no CH preparation every request runs
  # in flexible mode, no ch.disable flag needed.
  profiles_ch: []
  profiles_lm: []

  # Encoded values required by the built-in foot.json custom model, plus
  # average_slope/max_slope (need elevation) for a future flat/hilly preference.
  graph.encoded_values: foot_access, foot_priority, foot_average_speed, hike_rating, country, road_class, foot_road_access, mtb_rating, average_slope, max_slope

  # Foot routing: motorways/trunks are never walkable, skip them at import.
  import.osm.ignored_highways: motorway,trunk

  prepare.min_network_size: 200
  prepare.subnetworks.threads: 1

  routing.non_ch.max_waypoint_distance: 1000000

server:
  application_connectors:
    - type: http
      port: 8989
      bind_host: localhost
      max_request_header_size: 50k
  request_log:
    appenders: []
  admin_connectors:
    - type: http
      port: 8990
      bind_host: localhost

logging:
  appenders:
    - type: console
      time_zone: UTC
      log_format: "%d{YYYY-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
